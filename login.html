<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (window.location.protocol === 'http:' && !['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname)) {
            window.location.replace('https://' + window.location.host + window.location.pathname + window.location.search + window.location.hash);
        }
    </script>
    <title>Modern Todo - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-layout">
    <div class="auth-card">
        <h2>Sign in</h2>
        <p class="auth-subtitle">Welcome back! Please enter your details.</p>

        <div class="auth-form-group">
            <label for="user-email">Email Address</label>
            <input type="email" id="user-email" class="auth-input" placeholder="Enter your email">
        </div>
        <div class="auth-form-group">
            <label for="user-pw">Password</label>
            <input type="password" id="user-pw" class="auth-input" placeholder="Enter your password">
        </div>

        <button class="confirm-btn" id="login-btn">Sign in</button>

        <div class="divider">OR</div>

        <button class="google-btn" id="google-login-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google icon">
            Sign in with Google
        </button>
        <p class="auth-warning" id="secure-browser-warning" hidden>
            Google sign-in is blocked inside some in-app browsers. Open this page in Chrome, Safari, or your default browser:
            <a id="secure-browser-link" href="https://practice-todo-list-32af6.web.app/login.html" target="_blank" rel="noopener">Open login page</a>
            <button type="button" class="auth-copy-btn" id="secure-browser-copy-btn">Copy link</button>
        </p>

        <div class="auth-links">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <!-- Firebase Auto-Init -->
    <script src="/__/firebase/10.7.1/firebase-app-compat.js"></script>
    <script src="/__/firebase/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-init.js?v=v1"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const auth = firebase.auth();
        const GOOGLE_CLIENT_ID = '297469029810-32athgcp6i3lh36ma72famfb9dpk82ol.apps.googleusercontent.com';
        const emailInput = document.getElementById('user-email');
        const pwInput = document.getElementById('user-pw');
        const loginBtn = document.getElementById('login-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const secureBrowserWarning = document.getElementById('secure-browser-warning');
        const secureBrowserLink = document.getElementById('secure-browser-link');
        const secureBrowserCopyBtn = document.getElementById('secure-browser-copy-btn');
        const googleLoginDefaultText = googleLoginBtn.textContent.trim();
        const secureLoginUrl = 'https://practice-todo-list-32af6.web.app/login.html';

        const isEmbeddedBrowser = () => {
            const ua = navigator.userAgent || '';
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isIOSWebView = isIOS && /AppleWebKit/i.test(ua) && !/Safari/i.test(ua);
            const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            return isStandalone || isIOSWebView || /FBAN|FBAV|FB_IAB|Instagram|Line\/|KAKAOTALK|NAVER|DaumApps|Twitter|TikTok|Snapchat|Pinterest|; wv\)|\bwv\b|WebView/i.test(ua);
        };

        const openInSecureBrowser = () => {
            secureBrowserWarning.hidden = false;
            copySecureBrowserUrl();
        };

        const embeddedBrowserBlocked = isEmbeddedBrowser();
        if (embeddedBrowserBlocked) {
            secureBrowserWarning.hidden = false;
            googleLoginBtn.lastChild.textContent = ' Copy secure login link';
        }

        const copySecureBrowserUrl = async () => {
            try {
                await navigator.clipboard.writeText(secureLoginUrl);
                alert('Login link copied. Paste it into Chrome, Safari, or your default browser:\n' + secureLoginUrl);
            } catch (error) {
                if (secureBrowserLink) secureBrowserLink.focus();
                alert('Copy this login link into Chrome, Safari, or your default browser:\n' + secureLoginUrl);
            }
        };

        if (secureBrowserCopyBtn) secureBrowserCopyBtn.addEventListener('click', copySecureBrowserUrl);

        const getAuthErrorMessage = (error) => {
            if (error.code === 'auth/unauthorized-domain') {
                return 'This domain is not authorized for Firebase Authentication. Add it in Firebase Console > Authentication > Settings > Authorized domains.';
            }
            if (error.code === 'auth/operation-not-supported-in-this-environment') {
                return 'Google login is not supported in this browser environment. Please open the deployed Firebase Hosting URL or use a Firebase local server.';
            }
            if (error.code === 'auth/popup-blocked') {
                return 'The browser blocked Google login. Please allow popups for this site or open it in Chrome/Safari.';
            }
            return error.message;
        };

        const setGoogleLoginLoading = (isLoading) => {
            googleLoginBtn.disabled = isLoading;
            googleLoginBtn.lastChild.textContent = isLoading ? ' Opening Google...' : ` ${googleLoginDefaultText}`;
        };

        const signInWithGoogleToken = () => {
            if (!window.google || !google.accounts || !google.accounts.oauth2) {
                alert('Google sign-in is still loading. Please try again in a moment.');
                return;
            }

            setGoogleLoginLoading(true);
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'openid email profile',
                prompt: 'select_account',
                callback: (response) => {
                    if (response.error || !response.access_token) {
                        setGoogleLoginLoading(false);
                        alert('Google login failed: ' + (response.error_description || response.error || 'No access token returned.'));
                        return;
                    }

                    const credential = firebase.auth.GoogleAuthProvider.credential(null, response.access_token);
                    auth.signInWithCredential(credential)
                        .then(() => window.location.replace('index.html'))
                        .catch((error) => {
                            setGoogleLoginLoading(false);
                            alert('Google login failed: ' + getAuthErrorMessage(error));
                        });
                },
                error_callback: (error) => {
                    setGoogleLoginLoading(false);
                    alert('Google login failed: ' + (error.message || error.type || 'Google popup was closed.'));
                }
            });

            tokenClient.requestAccessToken();
        };
        // Email Login
        loginBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = pwInput.value;
            if (!email || !password) return alert('Please enter both email and password.');

            auth.signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = 'index.html')
                .catch((error) => alert('Login failed: ' + error.message));
        });

        // Google Login
        googleLoginBtn.addEventListener('click', () => {
            if (embeddedBrowserBlocked) {
                openInSecureBrowser();
                return;
            }

            signInWithGoogleToken();
        });

        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'index.html';
        });
    </script>
</body>

</html>
