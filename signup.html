<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (window.location.protocol === 'http:' && !['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname)) {
            window.location.replace('https://' + window.location.host + window.location.pathname + window.location.search + window.location.hash);
        }
    </script>
    <title>Planary - Sign up</title>
    <meta name="description" content="Planary는 할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 관리하는 생산성 웹앱입니다.">
    <meta property="og:title" content="Planary - Sign up">
    <meta property="og:description" content="Planary는 할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 관리하는 생산성 웹앱입니다.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Planary">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-layout">
    <div class="auth-card">
        <h2>회원가입</h2>
        <p class="auth-subtitle">할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 시작하세요.</p>

        <div class="auth-form-group">
            <label for="reg-email">이메일</label>
            <input type="email" id="reg-email" class="auth-input" placeholder="이메일을 입력하세요">
        </div>
        <div class="auth-form-group">
            <label for="reg-pw">비밀번호</label>
            <input type="password" id="reg-pw" class="auth-input" placeholder="비밀번호를 만들어주세요">
        </div>
        <div class="auth-form-group">
            <label for="reg-pw-confirm">비밀번호 확인</label>
            <input type="password" id="reg-pw-confirm" class="auth-input" placeholder="비밀번호를 한 번 더 입력하세요">
        </div>

        <button class="confirm-btn" id="signup-btn">회원가입</button>

        <div class="divider">또는</div>

        <button class="google-btn" id="google-signup-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google 아이콘">
            Google로 회원가입
        </button>
        <p class="auth-warning" id="secure-browser-warning" hidden>
            일부 인앱 브라우저에서는 Google 로그인이 차단됩니다. Chrome, Safari 또는 기본 브라우저에서 열어주세요:
            <a id="secure-browser-link" href="/" target="_blank" rel="noopener">앱 열기</a>
            <button type="button" class="auth-copy-btn" id="secure-browser-copy-btn">링크 복사</button>
        </p>

        <div class="auth-links">
            <p>이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
        </div>
    </div>

    <!-- Firebase Auto-Init -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-init.js?v=v1"></script>

    <script>
        const auth = firebase.auth();
        auth.useDeviceLanguage();
        const emailInput = document.getElementById('reg-email');
        const pwInput = document.getElementById('reg-pw');
        const pwConfirmInput = document.getElementById('reg-pw-confirm');
        const signupBtn = document.getElementById('signup-btn');
        const googleSignupBtn = document.getElementById('google-signup-btn');
        const secureBrowserWarning = document.getElementById('secure-browser-warning');
        const secureBrowserLink = document.getElementById('secure-browser-link');
        const secureBrowserCopyBtn = document.getElementById('secure-browser-copy-btn');
        const googleSignupDefaultText = googleSignupBtn.textContent.trim();
        const secureSignupUrl = window.location.origin + '/signup.html';
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });
        let isNavigatingToApp = false;
        if (secureBrowserLink) secureBrowserLink.href = secureSignupUrl;

        const goToApp = () => {
            if (isNavigatingToApp) return;
            isNavigatingToApp = true;
            window.location.replace('/');
        };

        const isEmbeddedBrowser = () => {
            const ua = navigator.userAgent || '';
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isIOSWebView = isIOS && /AppleWebKit/i.test(ua) && !/Safari/i.test(ua);
            return isIOSWebView || /FBAN|FBAV|FB_IAB|Instagram|Line\/|KAKAOTALK|NAVER|DaumApps|Twitter|TikTok|Snapchat|Pinterest|; wv\)|\bwv\b|WebView/i.test(ua);
        };

        const isAndroid = () => /Android/i.test(navigator.userAgent || '');

        const getExternalBrowserUrl = () => {
            if (!isAndroid()) return secureSignupUrl;
            const target = new URL(secureSignupUrl);
            return `intent://${target.host}${target.pathname}${target.search}#Intent;scheme=${target.protocol.replace(':', '')};package=com.android.chrome;S.browser_fallback_url=${encodeURIComponent(secureSignupUrl)};end`;
        };

        const openInSecureBrowser = () => {
            secureBrowserWarning.hidden = false;
            const externalUrl = getExternalBrowserUrl();
            if (secureBrowserLink) secureBrowserLink.href = externalUrl;
            if (isAndroid()) window.location.href = externalUrl;
        };

        const signInWithPopupThenRedirect = async () => {
            try {
                await auth.signInWithPopup(googleProvider);
                goToApp();
            } catch (popupError) {
                if (popupError.code === 'auth/popup-closed-by-user' || popupError.code === 'auth/cancelled-popup-request') {
                    throw popupError;
                }
                if (popupError.code === 'auth/operation-not-supported-in-this-environment' || popupError.code === 'auth/web-storage-unsupported' || /disallowed_useragent|embedded|webview/i.test(popupError.message || '')) {
                    throw popupError;
                }
                await auth.signInWithRedirect(googleProvider);
            }
        };

        if (isEmbeddedBrowser()) {
            secureBrowserWarning.hidden = false;
        }

        const copySecureBrowserUrl = async () => {
            try {
                await navigator.clipboard.writeText(secureSignupUrl);
                alert('회원가입 링크를 복사했어요. Chrome, Safari 또는 기본 브라우저에 붙여넣어 주세요:\n' + secureSignupUrl);
            } catch (error) {
                if (secureBrowserLink) secureBrowserLink.focus();
                alert('아래 회원가입 링크를 Chrome, Safari 또는 기본 브라우저에 복사해 주세요:\n' + secureSignupUrl);
            }
        };

        if (secureBrowserCopyBtn) secureBrowserCopyBtn.addEventListener('click', copySecureBrowserUrl);

        const getAuthErrorMessage = (error) => {
            if (error.code === 'auth/unauthorized-domain') {
                return '이 도메인은 Firebase 인증에 등록되어 있지 않습니다. Firebase Console > Authentication > Settings > Authorized domains에서 추가해 주세요.';
            }
            if (error.code === 'auth/operation-not-allowed') {
                return 'Firebase Console에서 이메일/비밀번호 로그인이 비활성화되어 있습니다. Authentication > Sign-in method > Email/Password를 켜고 다시 시도해 주세요.';
            }
            if (error.code === 'auth/operation-not-supported-in-this-environment') {
                return '현재 브라우저 환경에서는 Google 로그인이 지원되지 않습니다. Safari, Chrome 또는 기본 브라우저에서 열어주세요.';
            }
            if (error.code === 'auth/web-storage-unsupported' || /disallowed_useragent|embedded|webview/i.test(error.message || '')) {
                return 'Instagram 등 일부 인앱 브라우저는 Google 로그인을 차단합니다. Chrome, Safari 또는 기본 브라우저에서 계속해 주세요.';
            }
            if (error.code === 'auth/popup-blocked') {
                return '브라우저가 Google 로그인 팝업을 차단했습니다. 팝업을 허용하거나 Chrome/Safari에서 열어주세요.';
            }
            if (error.code === 'auth/popup-closed-by-user') {
                return 'Google 로그인 창이 완료 전에 닫혔습니다.';
            }
            if (error.code === 'auth/account-exists-with-different-credential') {
                return '이 이메일은 다른 로그인 방식으로 이미 가입되어 있어요. 이메일/비밀번호로 먼저 로그인한 후 프로필에서 Google을 연결해 주세요.';
            }
            if ((error.message || '').includes('redirect_uri_mismatch')) {
                return 'Google OAuth 리디렉션 URI가 등록되어 있지 않습니다. Google Cloud Console에서 다음 URI를 승인된 리디렉션 URI로 추가하세요: https://planary-a2f6b.firebaseapp.com/__/auth/handler';
            }
            return error.message;
        };

        const setGoogleSignupLoading = (isLoading) => {
            googleSignupBtn.disabled = isLoading;
            googleSignupBtn.lastChild.textContent = isLoading ? ' Google 여는 중...' : ` ${googleSignupDefaultText}`;
        };

        const signInWithGoogle = () => {
            if (isEmbeddedBrowser()) {
                openInSecureBrowser();
                return;
            }

            setGoogleSignupLoading(true);
            signInWithPopupThenRedirect()
                .catch((error) => {
                    setGoogleSignupLoading(false);
                    if (error.code === 'auth/operation-not-supported-in-this-environment' || error.code === 'auth/web-storage-unsupported' || /disallowed_useragent|embedded|webview/i.test(error.message || '')) {
                        openInSecureBrowser();
                    }
                    alert('Google 회원가입에 실패했습니다: ' + getAuthErrorMessage(error));
                });
        };
        // Email Signup
        signupBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = pwInput.value;
            const confirmPw = pwConfirmInput.value;

            if (!email || !password) return alert('이메일과 비밀번호를 모두 입력해주세요.');
            if (password !== confirmPw) return alert('비밀번호가 일치하지 않습니다.');

            auth.createUserWithEmailAndPassword(email, password)
                .then(goToApp)
                .catch((error) => alert('회원가입에 실패했습니다: ' + getAuthErrorMessage(error)));
        });

        // Google Signup
        googleSignupBtn.addEventListener('click', () => {
            signInWithGoogle();
        });

        auth.getRedirectResult()
            .then((result) => {
                if (result && result.user) goToApp();
            })
            .catch((error) => {
                alert('Google 회원가입에 실패했습니다: ' + getAuthErrorMessage(error));
            });

        auth.onAuthStateChanged((user) => {
            if (user) goToApp();
        });
    </script>
</body>

</html>
