<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (window.location.protocol === 'http:' && !['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname)) {
            window.location.replace('https://' + window.location.host + window.location.pathname + window.location.search + window.location.hash);
        }
    </script>
    <title>Planary - Sign up</title>
    <meta name="description" content="Planary는 할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 관리하는 생산성 웹앱입니다.">
    <meta property="og:title" content="Planary - Sign up">
    <meta property="og:description" content="Planary는 할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 관리하는 생산성 웹앱입니다.">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-layout">
    <div class="auth-card">
        <h2>Create account</h2>
        <p class="auth-subtitle">할 일, 리마인더, 프로젝트, 위키를 한 작업 공간에서 시작하세요.</p>

        <div class="auth-form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="auth-input" placeholder="Enter your email">
        </div>
        <div class="auth-form-group">
            <label for="reg-pw">Password</label>
            <input type="password" id="reg-pw" class="auth-input" placeholder="Create a password">
        </div>
        <div class="auth-form-group">
            <label for="reg-pw-confirm">Confirm Password</label>
            <input type="password" id="reg-pw-confirm" class="auth-input" placeholder="Confirm your password">
        </div>

        <button class="confirm-btn" id="signup-btn">Create account</button>

        <div class="divider">OR</div>

        <button class="google-btn" id="google-signup-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google icon">
            Sign up with Google
        </button>
        <p class="auth-warning" id="secure-browser-warning" hidden>
            Google sign-in is blocked inside some in-app browsers. Open this page in Chrome, Safari, or your default browser:
            <a id="secure-browser-link" href="/" target="_blank" rel="noopener">Open app</a>
            <button type="button" class="auth-copy-btn" id="secure-browser-copy-btn">Copy link</button>
        </p>

        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <!-- Firebase Auto-Init -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-init.js?v=v1"></script>

    <script>
        const auth = firebase.auth();
        auth.useDeviceLanguage();
        const emailInput = document.getElementById('reg-email');
        const pwInput = document.getElementById('reg-pw');
        const pwConfirmInput = document.getElementById('reg-pw-confirm');
        const signupBtn = document.getElementById('signup-btn');
        const googleSignupBtn = document.getElementById('google-signup-btn');
        const secureBrowserWarning = document.getElementById('secure-browser-warning');
        const secureBrowserLink = document.getElementById('secure-browser-link');
        const secureBrowserCopyBtn = document.getElementById('secure-browser-copy-btn');
        const googleSignupDefaultText = googleSignupBtn.textContent.trim();
        const secureSignupUrl = window.location.origin + '/signup.html';
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });
        let isNavigatingToApp = false;
        if (secureBrowserLink) secureBrowserLink.href = secureSignupUrl;

        const goToApp = () => {
            if (isNavigatingToApp) return;
            isNavigatingToApp = true;
            window.location.replace('/');
        };

        const shouldUseRedirectLogin = () => {
            const ua = navigator.userAgent || '';
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isSafari = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(ua);
            const isIOSWebView = isIOS && /AppleWebKit/i.test(ua) && !/Safari/i.test(ua);
            const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
            return isStandalone || isIOS || isSafari || isIOSWebView || /FBAN|FBAV|FB_IAB|Instagram|Line\/|KAKAOTALK|NAVER|DaumApps|Twitter|TikTok|Snapchat|Pinterest|; wv\)|\bwv\b|WebView/i.test(ua);
        };

        const openInSecureBrowser = () => {
            secureBrowserWarning.hidden = false;
            copySecureBrowserUrl();
        };

        const redirectLoginPreferred = shouldUseRedirectLogin();
        if (redirectLoginPreferred) {
            secureBrowserWarning.hidden = true;
        }

        const copySecureBrowserUrl = async () => {
            try {
                await navigator.clipboard.writeText(secureSignupUrl);
                alert('Sign-up link copied. Paste it into Chrome, Safari, or your default browser:\n' + secureSignupUrl);
            } catch (error) {
                if (secureBrowserLink) secureBrowserLink.focus();
                alert('Copy this sign-up link into Chrome, Safari, or your default browser:\n' + secureSignupUrl);
            }
        };

        if (secureBrowserCopyBtn) secureBrowserCopyBtn.addEventListener('click', copySecureBrowserUrl);

        const getAuthErrorMessage = (error) => {
            if (error.code === 'auth/unauthorized-domain') {
                return 'This domain is not authorized for Firebase Authentication. Add it in Firebase Console > Authentication > Settings > Authorized domains.';
            }
            if (error.code === 'auth/operation-not-allowed') {
                return 'Email/Password login is disabled in Firebase Console. Enable Authentication > Sign-in method > Email/Password, then try again.';
            }
            if (error.code === 'auth/operation-not-supported-in-this-environment') {
                return 'Google login is not supported in this browser environment. Try opening this page in Safari, Chrome, or your default browser.';
            }
            if (error.code === 'auth/popup-blocked') {
                return 'The browser blocked Google login. Please allow popups for this site or open it in Chrome/Safari.';
            }
            if (error.code === 'auth/popup-closed-by-user') {
                return 'Google login was closed before it finished.';
            }
            if (error.code === 'auth/account-exists-with-different-credential') {
                return 'This email already has another login method. Sign in with email/password first, then connect Google from Profile.';
            }
            if ((error.message || '').includes('redirect_uri_mismatch')) {
                return 'Google OAuth redirect URI is not registered. In Google Cloud Console, add this authorized redirect URI: https://planary-a2f6b.firebaseapp.com/__/auth/handler';
            }
            return error.message;
        };

        const setGoogleSignupLoading = (isLoading) => {
            googleSignupBtn.disabled = isLoading;
            googleSignupBtn.lastChild.textContent = isLoading ? ' Opening Google...' : ` ${googleSignupDefaultText}`;
        };

        const signInWithGoogle = () => {
            setGoogleSignupLoading(true);
            if (redirectLoginPreferred) {
                auth.signInWithRedirect(googleProvider).catch((error) => {
                    setGoogleSignupLoading(false);
                    alert('Google login failed: ' + getAuthErrorMessage(error));
                });
                return;
            }

            auth.signInWithPopup(googleProvider)
                .then(goToApp)
                .catch((error) => {
                    if (['auth/popup-blocked', 'auth/popup-closed-by-user', 'auth/cancelled-popup-request', 'auth/operation-not-supported-in-this-environment'].includes(error.code)) {
                        auth.signInWithRedirect(googleProvider).catch((redirectError) => {
                            setGoogleSignupLoading(false);
                            alert('Google login failed: ' + getAuthErrorMessage(redirectError));
                        });
                        return;
                    }
                    setGoogleSignupLoading(false);
                    alert('Google login failed: ' + getAuthErrorMessage(error));
                });
        };
        // Email Signup
        signupBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = pwInput.value;
            const confirmPw = pwConfirmInput.value;

            if (!email || !password) return alert('Please enter both email and password.');
            if (password !== confirmPw) return alert('Passwords do not match.');

            auth.createUserWithEmailAndPassword(email, password)
                .then(goToApp)
                .catch((error) => alert('Signup failed: ' + getAuthErrorMessage(error)));
        });

        // Google Signup
        googleSignupBtn.addEventListener('click', () => {
            signInWithGoogle();
        });

        auth.getRedirectResult()
            .then((result) => {
                if (result && result.user) goToApp();
            })
            .catch((error) => {
                alert('Google login failed: ' + getAuthErrorMessage(error));
            });

        auth.onAuthStateChanged((user) => {
            if (user) goToApp();
        });
    </script>
</body>

</html>
