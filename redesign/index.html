  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<body>
  <div id="root"></div>

  <!-- Tweaks panel (provides TweaksPanel, useTweaks, TweakRadio, etc as globals) -->
  <script type="text/babel" src="/redesign/src/tweaks-panel.jsx"></script>

  <!-- Planary modules — order matters: data → icons → i18n → components → pages → app → firebase-bridge.
       Absolute paths so the bundle works whether the URL is /redesign/ or /redesign (Vercel's
       trailingSlash:false rewrites the trailing slash away). -->
  <script type="text/babel" src="/redesign/src/icons.jsx"></script>
  <script type="text/babel" src="/redesign/src/data.jsx"></script>
  <script type="text/babel" src="/redesign/src/i18n.jsx"></script>
  <script type="text/babel" src="/redesign/src/components.jsx"></script>
  <script type="text/babel" src="/redesign/src/pages-home-tasks.jsx"></script>
  <script type="text/babel" src="/redesign/src/pages-rest.jsx"></script>
  <script type="text/babel" src="/redesign/src/onboarding.jsx"></script>
  <script type="text/babel" src="/redesign/src/user-guide.jsx"></script>
  <script type="text/babel" src="/redesign/src/app.jsx"></script>
  <script type="text/babel" src="/redesign/src/firebase-bridge.jsx"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .catch((err) => console.warn("[Planary] service worker registration failed", err));
      });
    }
  </script>
</body>
</html>
